<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>AGROTECH — Test de mapa (zoom)</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{background:#0a0d0b;color:#f3f1e9;font-family:'JetBrains Mono',monospace;height:100%;overflow:hidden;}
  #wrap{position:relative;width:100vw;height:100vh;}
  #mapCanvas{display:block;width:100%;height:100%;cursor:grab;}
  #mapCanvas:active{cursor:grabbing;}
  #hud{
    position:absolute;top:14px;left:16px;font-size:11px;letter-spacing:1px;
    color:#7e9183;line-height:1.6;background:rgba(16,20,15,0.55);
    border:1px solid #23291f;border-radius:8px;padding:10px 14px;backdrop-filter:blur(6px);
  }
  #hud b{color:#b6ff3c;}
  #zoomBadge{
    position:absolute;top:14px;right:16px;font-size:12px;color:#46c6e8;
    background:rgba(16,20,15,0.55);border:1px solid #23291f;border-radius:8px;
    padding:8px 14px;backdrop-filter:blur(6px);
  }
  #resetBtn{
    position:absolute;bottom:14px;right:16px;font-family:inherit;font-size:11px;
    letter-spacing:1px;text-transform:uppercase;background:#141a13;color:#f3f1e9;
    border:1px solid #23291f;border-radius:6px;padding:8px 14px;cursor:pointer;
  }
  #resetBtn:hover{border-color:#7CFF5E;color:#7CFF5E;}
  #zoomControls{
    position:absolute;top:70px;right:16px;display:flex;flex-direction:column;gap:6px;
  }
  #zoomControls button{
    width:36px;height:36px;font-family:inherit;font-size:18px;line-height:1;
    background:rgba(16,20,15,0.7);color:#f3f1e9;border:1px solid #23291f;border-radius:6px;
    cursor:pointer;backdrop-filter:blur(6px);
  }
  #zoomControls button:hover{border-color:#7CFF5E;color:#7CFF5E;}
  #legend{
    position:absolute;bottom:14px;left:16px;font-size:10px;color:#7e9183;
    display:flex;gap:14px;letter-spacing:1px;background:rgba(16,20,15,0.55);
    border:1px solid #23291f;border-radius:8px;padding:8px 14px;backdrop-filter:blur(6px);
  }
  #legend span{display:flex;align-items:center;gap:5px;}
  .sw{width:8px;height:8px;border-radius:50%;display:inline-block;}
</style>
</head>
<body>
<div id="wrap">
  <canvas id="mapCanvas"></canvas>
  <div id="hud">
    <b>AGROTECH · TEST DE MAPA</b><br>
    Rueda del mouse: <b>zoom</b> (centrado en el cursor)<br>
    Click + arrastrar: <b>paneo</b><br>
    Camiones moviéndose en tiempo real por toda la red
  </div>
  <div id="zoomBadge">zoom: <span id="zoomVal">1.0x</span></div>
  <div id="zoomControls">
    <button id="zoomIn" title="Acercar">+</button>
    <button id="zoomOut" title="Alejar">−</button>
  </div>
  <div id="legend">
    <span><i class="sw" style="background:#36d399"></i>normal</span>
    <span><i class="sw" style="background:#ffb020"></i>riesgo</span>
    <span><i class="sw" style="background:#ff4757"></i>saturado</span>
    <span><i class="sw" style="background:#7a5fff"></i>fuera de ventana</span>
    <span><i class="sw" style="background:#46c6e8"></i>camión</span>
  </div>
  <button id="resetBtn">↺ Reset vista</button>
</div>

<script type="module">
  import { SimulationEngine } from './src/engine/SimulationEngine.js';
  import { findHotspots } from './src/engine/DecisionEngine.js';
  import { MapRenderer } from './src/ui/render.js';

  const canvas = document.getElementById('mapCanvas');
  const engine = new SimulationEngine(() => {}); // sin bitácora visual en este test
  const renderer = new MapRenderer(canvas);

  // arranca la simulación automáticamente para ver los camiones moverse
  engine.running = true;
  engine.speed = 3;

  let lastTick = performance.now();
  function frame(now) {
    const dtMs = now - lastTick;
    lastTick = now;
    engine.tick(dtMs);
    const hotspots = findHotspots(engine.nodes, 2);
    renderer.render(engine, hotspots);
    document.getElementById('zoomVal').textContent = renderer.zoom.toFixed(1) + 'x';
    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);

  // -------------------- Zoom con la ruedita del mouse --------------------
  canvas.addEventListener('wheel', (e) => {
    e.preventDefault();
    const rect = canvas.getBoundingClientRect();
    const cx = e.clientX - rect.left;
    const cy = e.clientY - rect.top;
    const factor = e.deltaY < 0 ? 1.12 : 1 / 1.12;
    renderer.zoomAt(factor, cx, cy);
  }, { passive: false });

  // -------------------- Paneo con click + arrastrar --------------------
  let dragging = false, lastX = 0, lastY = 0;
  canvas.addEventListener('mousedown', (e) => {
    dragging = true; lastX = e.clientX; lastY = e.clientY;
  });
  window.addEventListener('mousemove', (e) => {
    if (!dragging) return;
    const dx = e.clientX - lastX, dy = e.clientY - lastY;
    lastX = e.clientX; lastY = e.clientY;
    renderer.panBy(dx, dy);
  });
  window.addEventListener('mouseup', () => { dragging = false; });

  // soporte táctil básico (pinch simplificado con dos dedos -> distancia)
  let touchDist = null;
  canvas.addEventListener('touchmove', (e) => {
    if (e.touches.length === 2) {
      e.preventDefault();
      const [t1, t2] = e.touches;
      const dist = Math.hypot(t2.clientX - t1.clientX, t2.clientY - t1.clientY);
      const rect = canvas.getBoundingClientRect();
      const cx = (t1.clientX + t2.clientX) / 2 - rect.left;
      const cy = (t1.clientY + t2.clientY) / 2 - rect.top;
      if (touchDist) renderer.zoomAt(dist / touchDist, cx, cy);
      touchDist = dist;
    }
  }, { passive: false });
  canvas.addEventListener('touchend', () => { touchDist = null; });

  document.getElementById('resetBtn').onclick = () => renderer.resetView();

  document.getElementById('zoomIn').onclick = () => {
    const rect = canvas.getBoundingClientRect();
    renderer.zoomAt(1.25, rect.width / 2, rect.height / 2);
  };
  document.getElementById('zoomOut').onclick = () => {
    const rect = canvas.getBoundingClientRect();
    renderer.zoomAt(1 / 1.25, rect.width / 2, rect.height / 2);
  };
</script>
</body>
</html>
